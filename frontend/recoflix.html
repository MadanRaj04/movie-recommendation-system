// ─── INTERACTION TRACKER ──────────────────────────────────────────────────────
class InteractionTracker {
  constructor(userId) {
    this.userId = userId;
    this.storageKey = `rflix_events_${userId}`;
    this.listeners = [];
    try { this.events = JSON.parse(localStorage.getItem(this.storageKey) || '[]'); }
    catch { this.events = []; }
  }
  track(type, data = {}) {
    const ev = { type, ts: Date.now(), ...data };
    this.events.push(ev);
    if (this.events.length > 200) this.events = this.events.slice(-200);
    try { localStorage.setItem(this.storageKey, JSON.stringify(this.events)); } catch {}
    this.listeners.forEach(fn => fn(ev));
    return ev;
  }
  onEvent(fn) { this.listeners.push(fn); return () => { this.listeners = this.listeners.filter(l => l !== fn); }; }
  getRecent(n = 40) { return this.events.slice(-n); }
  clear() { this.events = []; try { localStorage.removeItem(this.storageKey); } catch {} }
  getSummary() {
    const genreScore = {}, watchedIds = new Set(), hoveredLong = [];
    this.events.forEach(e => {
      (e.genres || []).forEach(g => genreScore[g] = (genreScore[g] || 0) + (e.type === 'watch_milestone' ? 3 : e.type === 'hover' ? (e.dwell > 3 ? 2 : 0.5) : 1));
      if (e.type === 'watch_milestone' && e.pct >= 75) watchedIds.add(e.tmdb_id);
      if (e.type === 'hover' && e.dwell > 3) hoveredLong.push(e.title);
    });
    return { genreScore, watchedIds, hoveredLong };
  }
}

const TRACKERS = {};
const getTracker = userId => { if (!TRACKERS[userId]) TRACKERS[userId] = new InteractionTracker(userId); return TRACKERS[userId]; };

// ─── CLAUDE AI RECOMMENDATIONS ────────────────────────────────────────────────
async function fetchAIRecs(user, tracker, apiKey) {
  const recent = tracker.getRecent(40);
  const { genreScore, watchedIds } = tracker.getSummary();

  const topGenres = Object.entries(genreScore).sort((a,b) => b[1]-a[1]).slice(0,4).map(([g]) => g);

  const candidates = ALL_MOVIES
    .filter(m => !watchedIds.has(m.tmdb_id))
    .sort((a, b) => {
      const scoreA = (a.genres || []).filter(g => topGenres.includes(g)).length * 2 + (a.rating || 0) * 0.1;
      const scoreB = (b.genres || []).filter(g => topGenres.includes(g)).length * 2 + (b.rating || 0) * 0.1;
      return scoreB - scoreA;
    })
    .slice(0, 50);

  const interactionLines = recent.map(e => {
    if (e.type === 'hover' && e.dwell > 1) return `• Hovered "${e.title}" (${(e.genres||[]).join('/')}) for ${e.dwell.toFixed(1)}s`;
    if (e.type === 'movie_play') return `• Opened "${e.title}" (${(e.genres||[]).join('/')})`;
    if (e.type === 'watch_milestone') return `• Watched "${e.title}" to ${e.pct}%${e.pct >= 100 ? ' ✓ COMPLETED' : ''}`;
    if (e.type === 'rewind') return `• Rewound "${e.title}" (${e.count}× — high interest signal)`;
    if (e.type === 'genre_scroll') return `• Scrolled through ${e.genre} row`;
    if (e.type === 'search') return `• Searched: "${e.query}"`;
    return null;
  }).filter(Boolean).join('\n');

  const prompt = `You are RecoFlix's AI engine. Recommend movies based on real user behavior.

USER: ${user.name}
BASE PREFERENCES: ${user.preferences.join(', ')}
TOP ENGAGED GENRES THIS SESSION: ${topGenres.join(', ') || 'None yet — use base preferences'}

RECENT BEHAVIOR:
${interactionLines || '(No interactions yet — recommend based on preferences)'}

CANDIDATES (pick 6):
${candidates.map(m => `[${m.tmdb_id}] "${m.title}" | ${(m.genres||[]).join('/')} | ⭐${m.rating} | ${m.runtime}min`).join('\n')}

Recommend 6 movies. Reference SPECIFIC interactions in your reasons (e.g. "You rewound X 3 times — Y has similar..."). Keep reasons under 65 characters.

Respond ONLY with valid JSON, no markdown:
[{"tmdb_id":"...","reason":"..."}]`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 800,
      messages: [{ role: 'user', content: prompt }],
    }),
  });

  if (!resp.ok) throw new Error(`API ${resp.status}`);
  const data = await resp.json();
  let text = data.content?.[0]?.text || '[]';
  text = text.replace(/```json|```/g, '').trim();
  const parsed = JSON.parse(text);
  return parsed.map(r => ({ ...MOVIE_MAP[r.tmdb_id], reason: r.reason })).filter(m => m && m.title);
}

// ─── FALLBACK RECOMMENDATIONS ─────────────────────────────────────────────────
function getFallbackRecs(user, tracker) {
  const { genreScore, watchedIds } = tracker.getSummary();
  const topGenres = Object.entries(genreScore).sort((a,b) => b[1]-a[1]).slice(0,3).map(([g]) => g);
  const activeGenres = topGenres.length ? topGenres : user.preferences;
  return ALL_MOVIES
    .filter(m => !watchedIds.has(m.tmdb_id) && (m.genres||[]).some(g => activeGenres.includes(g)))
    .sort((a,b) => (b.rating||0) - (a.rating||0))
    .slice(0, 6)
    .map(m => ({ ...m, reason: `Matches your ${activeGenres[0] || 'top'} genre interest` }));
}

// Telemetry Toast
function TelemetryToast({ events }) {
  const [visible, setVisible] = useState([]);
  const timerRef = useRef({});

  useEffect(() => {
    if (!events.length) return;
    const last = events[events.length - 1];
    const id = last.ts;
    const labels = {
      hover: e => e.dwell > 1 ? `👁 Hovered "${(e.title||'').slice(0,20)}" · ${e.dwell.toFixed(1)}s` : null,
      movie_play: e => `▶ Playing "${(e.title||'').slice(0,22)}"`,
      watch_milestone: e => `📊 ${e.pct}% watched · "${(e.title||'').slice(0,18)}"`,
      rewind: e => `⏪ Rewind #${e.count} tracked`,
      genre_scroll: e => `🎬 Browsed ${e.genre}`,
      search: e => `🔍 Searched "${e.query}"`,
      fast_forward: e => `⏩ Skipped ahead · noted`,
    };
    const fn = labels[last.type];
    const label = fn ? fn(last) : null;
    if (!label) return;
    setVisible(v => [...v.slice(-2), { id, label }]);
    timerRef.current[id] = setTimeout(() => {
      setVisible(v => v.filter(x => x.id !== id));
    }, 3000);
    return () => clearTimeout(timerRef.current[id]);
  }, [events]);

  return (
    <div style={{position:'fixed',bottom:20,right:20,zIndex:500,display:'flex',flexDirection:'column',gap:6,pointerEvents:'none'}}>
      {visible.map(t => (
        <div key={t.id} style={{background:'rgba(20,20,20,0.96)',border:'1px solid rgba(229,9,20,0.3)',borderRadius:8,padding:'7px 13px',fontSize:12,color:'#ccc',backdropFilter:'blur(10px)',animation:'slideIn 0.3s ease',whiteSpace:'nowrap'}}>
          <span style={{color:'#E50914',fontWeight:700}}>TRACKED</span> {t.label}
        </div>
      ))}
    </div>
  );
}

// Movie Card
function MovieCard({ movie, onPlay, tracker, showReason = false }) {
  const [hov, setHov] = useState(false);
  const dwellStart = useRef(null);

  const handleEnter = () => {
    setHov(true);
    dwellStart.current = Date.now();
  };
  const handleLeave = () => {
    setHov(false);
    if (dwellStart.current) {
      const dwell = (Date.now() - dwellStart.current) / 1000;
      if (dwell > 0.5) tracker?.track('hover', { title: movie.title, tmdb_id: movie.tmdb_id, genres: movie.genres, dwell: +dwell.toFixed(2) });
      dwellStart.current = null;
    }
  };
  const handlePlay = e => {
    e?.stopPropagation();
    tracker?.track('movie_play', { title: movie.title, tmdb_id: movie.tmdb_id, genres: movie.genres });
    onPlay(movie);
  };

  return (
    <div
      style={{ width: 160, flexShrink: 0, cursor: 'pointer', position: 'relative', transition: 'transform 0.25s', transform: hov ? 'scale(1.08)' : 'scale(1)', zIndex: hov ? 10 : 1 }}
      onMouseEnter={handleEnter} onMouseLeave={handleLeave} onClick={handlePlay}
    >
      <div style={{ borderRadius: 8, overflow: 'hidden', aspectRatio: '2/3', background: '#1a1a1a', boxShadow: hov ? '0 8px 32px rgba(0,0,0,0.7)' : 'none', transition: 'box-shadow 0.25s' }}>
        <Poster movie={movie} style={{ width:'100%', height:'100%', objectFit:'cover' }} />
      </div>
      {hov && (
        <div style={{ position:'absolute', bottom:0, left:0, right:0, borderRadius:'0 0 8px 8px', padding:'32px 8px 8px', background:'linear-gradient(to top,#000 60%,transparent)', animation:'fadeIn 0.15s' }}>
          <p style={{ color:'#fff', fontSize:12, fontWeight:700, marginBottom:2, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{movie.title}</p>
          <p style={{ color:'#aaa', fontSize:11, marginBottom:3 }}>{(movie.genres||[]).slice(0,2).join(' · ')}</p>
          {movie.rating > 0 && <p style={{ color:'#f5c518', fontSize:11, marginBottom: showReason ? 3 : 5 }}>★ {movie.rating} {movie.runtime ? `· ${movie.runtime}m` : ''}</p>}
          {showReason && movie.reason && <p style={{ color:'#60a5fa', fontSize:10, marginBottom:5, lineHeight:1.4, display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical', overflow:'hidden' }}>{movie.reason}</p>}
          <button onClick={handlePlay} style={{ width:'100%', padding:'5px 0', background:'#E50914', color:'#fff', border:'none', borderRadius:4, fontSize:12, fontWeight:700 }}>▶ Play</button>
        </div>
      )}
    </div>
  );
}

// Video Player
function Player({ user, movie, onBack, tracker, apiKey, toastEvents, setToastEvents }) {
  const [playing, setPlaying] = useState(false);
  const [progress, setProgress] = useState(0);
  const [rewindCount, setRewindCount] = useState(0);
  const [showCtrl, setShowCtrl] = useState(true);
  const [volume, setVolume] = useState(75);
  const [recs, setRecs] = useState([]);
  const [recsLoading, setRecsLoading] = useState(false);
  const [milestones, setMilestones] = useState(new Set());
  const [aiStatus, setAiStatus] = useState('');
  const DURATION = 90;

  const ivl = useRef(null);
  const ctrlTimer = useRef(null);
  const progressRef = useRef(0);
  const rewindRef = useRef(0);

  const pushToast = useCallback(ev => setToastEvents(prev => [...prev, ev]), []);

  const resetCtrl = useCallback(() => {
    setShowCtrl(true);
    clearTimeout(ctrlTimer.current);
    ctrlTimer.current = setTimeout(() => setShowCtrl(false), 3000);
  }, []);

  useEffect(() => {
    resetCtrl();
    return () => { clearInterval(ivl.current); clearTimeout(ctrlTimer.current); };
  }, []);

  useEffect(() => {
    if (!playing) { clearInterval(ivl.current); return; }
    ivl.current = setInterval(() => {
      setProgress(p => {
        const np = Math.min(p + 100 / (DURATION * 4), 100);
        progressRef.current = np;
        [10, 25, 50, 75, 100].forEach(ms => {
          if (np >= ms && !milestones.has(ms)) {
            setMilestones(prev => new Set([...prev, ms]));
            const ev = tracker.track('watch_milestone', { title: movie.title, tmdb_id: movie.tmdb_id, genres: movie.genres, pct: ms });
            pushToast(ev);
            if (ms === 25) loadRecs();
          }
        });
        if (np >= 100) { clearInterval(ivl.current); setPlaying(false); }
        return np;
      });
    }, 250);
    return () => clearInterval(ivl.current);
  }, [playing]);

  const loadRecs = async () => {
    setRecsLoading(true);
    setAiStatus('Analyzing your behavior...');
    try {
      if (apiKey) {
        const r = await fetchAIRecs(user, tracker, apiKey);
        setRecs(r); setAiStatus('AI picks updated');
      } else {
        setRecs(getFallbackRecs(user, tracker)); setAiStatus('Smart picks ready');
      }
    } catch {
      setRecs(getFallbackRecs(user, tracker)); setAiStatus('Picks based on your taste');
    }
    setRecsLoading(false);
  };

  const doRewind = e => {
    e?.stopPropagation();
    const n = rewindRef.current + 1;
    rewindRef.current = n;
    setRewindCount(n);
    setProgress(p => Math.max(0, p - 8));
    const ev = tracker.track('rewind', { title: movie.title, tmdb_id: movie.tmdb_id, genres: movie.genres, count: n });
    pushToast(ev);
  };

  const doFF = e => {
    e?.stopPropagation();
    setProgress(p => Math.min(p + 8, 100));
    const ev = tracker.track('fast_forward', { title: movie.title, tmdb_id: movie.tmdb_id });
    pushToast(ev);
  };

  const fmt = pct => { const s = (pct / 100) * DURATION * 60; return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; };
  const pct = Math.round(progress);

  return (
    <div style={{ display:'flex', minHeight:'100vh', background:'#000' }} onMouseMove={resetCtrl}>
      {/* Left — video area */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', position:'relative', minWidth:0 }} onClick={() => { setPlaying(p => !p); resetCtrl(); }}>
        {/* Screen */}
        <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', minHeight:400, position:'relative' }}>
          {movie.backdrop_url && (
            <img src={movie.backdrop_url} alt="" style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', opacity: playing ? 0.18 : 0.35, filter:'blur(2px)', transition:'opacity 0.5s' }} />
          )}
          <div style={{ position:'relative', zIndex:1, textAlign:'center' }}>
            {!playing && progress === 0 && (
              <div style={{ animation:'fadeUp 0.4s ease' }}>
                <div style={{ width:100, height:150, margin:'0 auto 16px', borderRadius:8, overflow:'hidden' }}><Poster movie={movie} style={{ width:'100%', height:'100%', objectFit:'cover' }} /></div>
                <h2 style={{ fontSize:26, fontWeight:800, marginBottom:6 }}>{movie.title}</h2>
                <p style={{ color:'#888', fontSize:13, marginBottom:8 }}>{(movie.genres||[]).join(' · ')} {movie.runtime ? `· ${movie.runtime}m` : ''} {movie.release_year ? `· ${movie.release_year}` : ''}</p>
                {movie.overview && <p style={{ color:'#aaa', fontSize:13, lineHeight:1.6, marginBottom:22, maxWidth:460, margin:'0 auto 22px' }}>{movie.overview.slice(0,160)}…</p>}
                <div style={{ width:64, height:64, borderRadius:'50%', border:'3px solid rgba(255,255,255,0.8)', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto', fontSize:26, cursor:'pointer' }}>▶</div>
              </div>
            )}
            {playing && <div style={{ fontSize:52, opacity: showCtrl ? 1 : 0, transition:'opacity 0.3s', filter:'drop-shadow(0 0 20px rgba(0,0,0,0.8))' }}>⏸</div>}
            {!playing && progress > 0 && progress < 100 && (
              <div>
                <div style={{ fontSize:52, marginBottom:8 }}>⏸</div>
                <p style={{ color:'#666', fontSize:13 }}>{pct}% watched · Click to resume</p>
              </div>
            )}
            {progress >= 100 && (
              <div style={{ animation:'fadeUp 0.4s ease' }}>
                <div style={{ fontSize:52, marginBottom:12 }}>✅</div>
                <h3 style={{ fontSize:22, fontWeight:700, marginBottom:6 }}>Watched!</h3>
                <p style={{ color:'#555', fontSize:13, marginBottom:22 }}>Your recommendations have been updated</p>
                <button onClick={e => { e.stopPropagation(); onBack(); }} style={{ padding:'10px 28px', background:'#E50914', color:'#fff', border:'none', borderRadius:8, fontSize:14, fontWeight:700 }}>← Back to Browse</button>
              </div>
            )}
          </div>
        </div>

        {/* Controls */}
        {showCtrl && progress < 100 && (
          <div style={{ padding:'8px 20px 20px', background:'linear-gradient(transparent,rgba(0,0,0,0.95))' }} onClick={e => e.stopPropagation()}>
            {/* Progress bar */}
            <div style={{ height:4, background:'#333', borderRadius:2, marginBottom:12, cursor:'pointer', position:'relative' }}
              onClick={e => { const r=e.currentTarget.getBoundingClientRect(); setProgress(Math.max(0,Math.min(100,((e.clientX-r.left)/r.width)*100))); }}>
              <div style={{ height:'100%', width:`${pct}%`, background:'#E50914', borderRadius:2, transition:'width 0.25s' }} />
              <div style={{ position:'absolute', top:'50%', left:`${pct}%`, transform:'translate(-50%,-50%)', width:12, height:12, borderRadius:'50%', background:'#fff', boxShadow:'0 0 6px rgba(229,9,20,0.8)' }} />
            </div>
            {/* Buttons */}
            <div style={{ display:'flex', alignItems:'center', gap:14 }}>
              <button onClick={() => setPlaying(p => !p)} style={{ background:'none', border:'none', color:'#fff', fontSize:24, padding:0 }}>{playing ? '⏸' : '▶'}</button>
              <button onClick={doRewind} style={{ background:'none', border:'none', color:'#fff', fontSize:18, padding:0 }} title="Rewind (tracked)">⏪</button>
              <button onClick={doFF} style={{ background:'none', border:'none', color:'#fff', fontSize:18, padding:0 }} title="Fast Forward (tracked)">⏩</button>
              <span style={{ color:'#888', fontSize:12 }}>{fmt(pct)} / {DURATION}:00</span>
              {rewindCount > 0 && <span style={{ color:'#fbbf24', fontSize:11, background:'rgba(251,191,36,0.1)', padding:'2px 8px', borderRadius:4 }}>⏪ {rewindCount} rewind{rewindCount > 1 ? 's' : ''} logged</span>}
              <input type="range" min={0} max={100} value={volume} onChange={e => setVolume(+e.target.value)} style={{ width:70 }} onClick={e => e.stopPropagation()} />
              <div style={{ flex:1 }} />
              <span style={{ color:'#333', fontSize:11 }}>{pct}%</span>
              <button onClick={e => { e.stopPropagation(); onBack(); }} style={{ background:'rgba(255,255,255,0.08)', border:'1px solid rgba(255,255,255,0.15)', color:'#fff', padding:'4px 14px', borderRadius:6, fontSize:12 }}>← Exit</button>
            </div>
          </div>
        )}

        {/* Top bar */}
        <div style={{ position:'absolute', top:0, left:0, right:0, padding:'14px 20px', display:'flex', alignItems:'center', gap:12, background:'linear-gradient(rgba(0,0,0,0.7),transparent)' }} onClick={e => e.stopPropagation()}>
          <button onClick={onBack} style={{ background:'rgba(0,0,0,0.5)', border:'1px solid rgba(255,255,255,0.15)', color:'#fff', padding:'5px 14px', borderRadius:6, fontSize:12, fontWeight:600 }}>← Back</button>
          <span style={{ fontSize:14, fontWeight:700, color:'#ddd' }}>{movie.title}</span>
          {movie.rating > 0 && <span style={{ color:'#f5c518', fontSize:12 }}>★ {movie.rating}</span>}
          <div style={{ flex:1 }} />
          <div style={{ width:30, height:30, borderRadius:6, background:user.color, display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, fontWeight:800 }}>{user.letter}</div>
        </div>
      </div>

      {/* Right — recommendations sidebar */}
      <div style={{ width:280, background:'#0d0d0d', borderLeft:'1px solid #1e1e1e', display:'flex', flexDirection:'column', flexShrink:0, overflowY:'auto' }}>
        <div style={{ padding:'14px 16px', borderBottom:'1px solid #1e1e1e' }}>
          <h3 style={{ fontSize:13, fontWeight:700, marginBottom:2 }}>Up Next · {user.name}</h3>
          <p style={{ color:'#333', fontSize:11 }}>
            {aiStatus || (recs.length ? 'Claude AI · Based on your behavior' : 'Watch to 25% to unlock AI picks')}
          </p>
        </div>

        {/* Progress to unlock */}
        {!recs.length && !recsLoading && (
          <div style={{ padding:'20px 14px', textAlign:'center' }}>
            <div style={{ fontSize:28, marginBottom:8 }}>🎯</div>
            <p style={{ color:'#444', fontSize:12, lineHeight:1.6, marginBottom:12 }}>Watch to 25% to unlock personalized AI recommendations</p>
            <div style={{ height:4, background:'#1a1a1a', borderRadius:2, marginBottom:6 }}>
              <div style={{ height:'100%', width:`${Math.min(pct * 4, 100)}%`, background:'#E50914', borderRadius:2, transition:'width 0.8s' }} />
            </div>
            <p style={{ color:'#333', fontSize:11 }}>{Math.min(pct, 25)}/25%</p>
          </div>
        )}

        {recsLoading && Array(5).fill(0).map((_,i) => (
          <div key={i} className="skeleton" style={{ height:76, margin:'6px 10px', borderRadius:8 }} />
        ))}

        {!recsLoading && recs.length > 0 && (
          <div style={{ padding:10 }}>
            <p style={{ color:'#2a5a2a', fontSize:10, textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:10, padding:'3px 8px', background:'rgba(42,90,42,0.15)', borderRadius:4, display:'inline-block' }}>✦ Claude AI Updated</p>
            {recs.map(m => (
              <div key={m.tmdb_id} style={{ display:'flex', gap:8, padding:8, borderRadius:8, marginBottom:6, cursor:'pointer', transition:'background 0.15s' }}
                onMouseEnter={e => e.currentTarget.style.background='#1a1a1a'}
                onMouseLeave={e => e.currentTarget.style.background='transparent'}
                onClick={() => { tracker.track('recommendation_click', { title: m.title, tmdb_id: m.tmdb_id }); onBack(); }}>
                <div style={{ width:46, flexShrink:0, borderRadius:4, overflow:'hidden', aspectRatio:'2/3' }}><Poster movie={m} style={{ width:'100%', height:'100%', objectFit:'cover' }} /></div>
                <div style={{ flex:1, minWidth:0 }}>
                  <p style={{ fontSize:12, fontWeight:600, marginBottom:2, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{m.title}</p>
                  <p style={{ color:'#555', fontSize:11, marginBottom:3 }}>{(m.genres||[]).slice(0,2).join(' · ')}</p>
                  {m.reason && <p style={{ color:'#60a5fa', fontSize:10, lineHeight:1.4, display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical', overflow:'hidden' }}>{m.reason}</p>}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// Browse
function Browse({ user, apiKey, onPlay, onLogout }) {
  const tracker = useMemo(() => getTracker(user.id), [user.id]);
  const [aiRecs, setAiRecs] = useState([]);
  const [aiLoading, setAiLoading] = useState(true);
  const [aiStatus, setAiStatus] = useState('');
  const [genreRows, setGenreRows] = useState({});
  const [hero, setHero] = useState(null);
  const [search, setSearch] = useState('');
  const [searchRes, setSearchRes] = useState([]);
  const [toastEvents, setToastEvents] = useState([]);
  const debounceTimer = useRef(null);
  const recTimer = useRef(null);

  // Load genre rows from embedded data
  useEffect(() => {
    const rows = {};
    GENRES.forEach(g => { rows[g] = MOVIES_BY_GENRE[g] || []; });
    setGenreRows(rows);
    // Pick hero: high-rated movie with backdrop
    const heroMovies = ALL_MOVIES.filter(m => m.backdrop_url && m.rating >= 7.5).sort((a,b) => b.rating - a.rating);
    setHero(heroMovies[0] || ALL_MOVIES[0]);
  }, []);

  // Load initial AI recs
  useEffect(() => {
    loadAIRecs();
    // Listen for tracker events to auto-refresh
    const unsub = tracker.onEvent(() => {
      clearTimeout(recTimer.current);
      recTimer.current = setTimeout(loadAIRecs, 6000);
    });
    return () => { unsub(); clearTimeout(recTimer.current); };
  }, [user.id]);

  const loadAIRecs = async () => {
    setAiLoading(true);
    setAiStatus(apiKey ? 'Claude is analyzing your behavior…' : 'Finding your picks…');
    try {
      if (apiKey) {
        const r = await fetchAIRecs(user, tracker, apiKey);
        if (r.length) { setAiRecs(r); setHero(r[0]); setAiStatus(''); }
        else throw new Error('empty');
      } else {
        const r = getFallbackRecs(user, tracker);
        setAiRecs(r); if (r.length) setHero(r[0]); setAiStatus('');
      }
    } catch {
      const r = getFallbackRecs(user, tracker);
      setAiRecs(r); if (r.length) setHero(r[0]); setAiStatus('');
    }
    setAiLoading(false);
  };

  const handleSearch = val => {
    setSearch(val);
    clearTimeout(debounceTimer.current);
    if (!val.trim()) { setSearchRes([]); return; }
    debounceTimer.current = setTimeout(() => {
      const q = val.toLowerCase();
      const res = ALL_MOVIES.filter(m =>
        m.title.toLowerCase().includes(q) ||
        (m.genres||[]).some(g => g.toLowerCase().includes(q)) ||
        (m.overview||'').toLowerCase().includes(q) ||
        (m.cast||[]).some(c => c.toLowerCase().includes(q)) ||
        (m.director||'').toLowerCase().includes(q)
      ).slice(0, 10);
      setSearchRes(res);
      tracker.track('search', { query: val });
    }, 400);
  };

  const handlePlay = movie => {
    tracker.track('movie_play', { title: movie.title, tmdb_id: movie.tmdb_id, genres: movie.genres });
    onPlay(movie);
  };

  const handleGenreScroll = genre => {
    const ev = tracker.track('genre_scroll', { genre });
    setToastEvents(prev => [...prev, ev]);
  };

  const moodFilters = [
    { label: '⚡ Something intense', genres: ['Action', 'Thriller'] },
    { label: '😂 Feel-good comedy', genres: ['Comedy', 'Animation'] },
    { label: '😱 Horror night', genres: ['Horror', 'Thriller'] },
    { label: '🌌 Mind-bending', genres: ['Science Fiction'] },
    { label: '💔 Emotional drama', genres: ['Drama', 'Romance'] },
    { label: '🔍 Crime thriller', genres: ['Crime', 'Thriller'] },
  ];

  const applyMood = (genres) => {
    const res = ALL_MOVIES.filter(m => (m.genres||[]).some(g => genres.includes(g))).sort((a,b) => b.rating - a.rating).slice(0, 10);
    setSearchRes(res);
    const ev = tracker.track('search', { query: genres.join(' / ') });
    setToastEvents(prev => [...prev, ev]);
  };

  return (
    <div style={{ minHeight:'100vh', background:'#080808' }}>
      <TelemetryToast events={toastEvents} />

      {/* Navbar */}
      <nav style={{ position:'sticky', top:0, zIndex:50, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'12px 36px', background:'rgba(8,8,8,0.97)', borderBottom:'1px solid #141414' }}>
        <div style={{ display:'flex', alignItems:'center', gap:32 }}>
          <span style={{ fontFamily:"'Bebas Neue',sans-serif", color:'#E50914', fontSize:24, letterSpacing:'0.12em' }}>RECOFLIX</span>
          {['Home','Movies','My List'].map(l => <a key={l} style={{ color:'#888', fontSize:13, cursor:'pointer', textDecoration:'none' }}>{l}</a>)}
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:14 }}>
          <div style={{ position:'relative' }}>
            <input value={search} onChange={e => handleSearch(e.target.value)} placeholder="🔍  Search movies, genres, cast…"
              style={{ background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:20, padding:'7px 16px', color:'#fff', fontSize:13, outline:'none', width:240 }} />
            {searchRes.length > 0 && (
              <div style={{ position:'absolute', top:'100%', left:0, right:0, background:'#141414', border:'1px solid rgba(255,255,255,0.1)', borderRadius:10, marginTop:4, zIndex:100, maxHeight:320, overflowY:'auto' }}>
                {searchRes.map(m => (
                  <div key={m.tmdb_id} style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 12px', cursor:'pointer', transition:'background 0.15s' }}
                    onMouseEnter={e => e.currentTarget.style.background='#1e1e1e'}
                    onMouseLeave={e => e.currentTarget.style.background='transparent'}
                    onClick={() => { setSearch(''); setSearchRes([]); handlePlay(m); }}>
                    <div style={{ width:32, height:48, borderRadius:4, overflow:'hidden', flexShrink:0 }}><Poster movie={m} style={{ width:'100%', height:'100%', objectFit:'cover' }} /></div>
                    <div>
                      <p style={{ fontSize:12, fontWeight:600 }}>{m.title}</p>
                      <p style={{ color:'#555', fontSize:11 }}>{(m.genres||[]).slice(0,2).join(' · ')} {m.rating > 0 ? `· ★ ${m.rating}` : ''}</p>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
          {apiKey && <span style={{ background:'rgba(229,9,20,0.15)', color:'#E50914', fontSize:10, padding:'3px 8px', borderRadius:4, fontWeight:700 }}>AI ON</span>}
          <div onClick={onLogout} title="Switch profile" style={{ width:34, height:34, borderRadius:8, background:user.color, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:14, fontWeight:800, cursor:'pointer' }}>{user.letter}</div>
          <button onClick={onLogout} style={{ background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.1)', color:'#888', padding:'5px 12px', borderRadius:6, fontSize:12 }}>Switch</button>
        </div>
      </nav>

      {/* Hero */}
      {hero && (
        <div style={{ position:'relative', minHeight:460, display:'flex', alignItems:'flex-end', overflow:'hidden', marginBottom:8 }}>
          {hero.backdrop_url && (
            <img src={hero.backdrop_url} alt="" style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', objectPosition:'center top', filter:'brightness(0.4)' }} />
          )}
          <div style={{ position:'absolute', inset:0, background:`linear-gradient(135deg, ${user.color}33 0%, transparent 60%)` }} />
          <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, transparent 30%, #080808 100%)' }} />
          <div style={{ position:'relative', padding:'0 52px 48px', maxWidth:600, animation:'fadeUp 0.6s ease' }}>
            {aiLoading ? (
              <div>
                <div className="skeleton" style={{ height:12, width:140, borderRadius:4, marginBottom:14 }} />
                <div className="skeleton" style={{ height:36, width:300, borderRadius:4, marginBottom:12 }} />
                <div className="skeleton" style={{ height:12, width:400, borderRadius:4 }} />
              </div>
            ) : (
              <div>
                <div style={{ color:'#E50914', fontSize:11, fontWeight:700, letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:10 }}>
                  {apiKey ? '✦ AI Pick for ' : '⭐ Top Pick for '}{user.name}
                </div>
                <h1 style={{ fontSize: hero.title.length > 20 ? 34 : 42, fontWeight:800, margin:'0 0 8px', lineHeight:1.1, textShadow:'0 2px 20px rgba(0,0,0,0.8)' }}>{hero.title}</h1>
                {hero.rating > 0 && <p style={{ color:'#f5c518', fontSize:13, marginBottom:6 }}>★ {hero.rating} {hero.runtime ? `· ${hero.runtime} min` : ''} {hero.release_year ? `· ${hero.release_year}` : ''}</p>}
                <p style={{ color:'#ccc', fontSize:13, margin:'0 0 6px', lineHeight:1.6 }}>{hero.reason || hero.overview?.slice(0, 160)}</p>
                {hero.cast?.length > 0 && <p style={{ color:'#555', fontSize:12, marginBottom:18 }}>Starring {hero.cast.slice(0,3).join(', ')}</p>}
                <div style={{ display:'flex', gap:10 }}>
                  <button onClick={() => handlePlay(hero)} style={{ padding:'10px 28px', background:'#E50914', color:'#fff', border:'none', borderRadius:8, fontSize:14, fontWeight:700, cursor:'pointer' }}>▶ Play</button>
                  <button style={{ padding:'10px 20px', background:'rgba(255,255,255,0.12)', color:'#fff', border:'none', borderRadius:8, fontSize:14, cursor:'pointer' }}>ℹ More Info</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* Mood Quick Filters */}
      <div style={{ padding:'4px 52px 20px', display:'flex', gap:8, flexWrap:'wrap' }}>
        {moodFilters.map(f => (
          <button key={f.label} onClick={() => applyMood(f.genres)} style={{ padding:'6px 14px', background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:20, color:'#ccc', fontSize:12, cursor:'pointer', transition:'all 0.2s' }}
            onMouseEnter={e => { e.target.style.background='rgba(229,9,20,0.15)'; e.target.style.borderColor='rgba(229,9,20,0.4)'; }}
            onMouseLeave={e => { e.target.style.background='rgba(255,255,255,0.06)'; e.target.style.borderColor='rgba(255,255,255,0.1)'; }}>
            {f.label}
          </button>
        ))}
      </div>

      {/* Search results */}
      {searchRes.length > 0 && search && (
        <div style={{ padding:'0 0 12px' }}>
          <MovieRow title={`Results for "${search}"`} movies={searchRes} loading={false} onPlay={handlePlay} tracker={tracker} />
        </div>
      )}

      {/* AI Recommendations Row */}
      <div onMouseEnter={() => handleGenreScroll('AI Recommendations')}>
        <MovieRow title="⭐ For You — AI Picks" movies={aiRecs} loading={aiLoading} onPlay={handlePlay} tracker={tracker} showReason accent />
      </div>

      {/* Genre Rows */}
      {GENRES.map(g => (
        <div key={g} onMouseEnter={() => handleGenreScroll(g)}>
          <MovieRow title={g} movies={genreRows[g] || []} loading={!genreRows[g]} onPlay={handlePlay} tracker={tracker} />
        </div>
      ))}

      {/* Footer */}
      <div style={{ padding:'24px 52px 48px', borderTop:'1px solid #141414' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
          <span style={{ fontFamily:"'Bebas Neue',sans-serif", color:'#333', fontSize:20, letterSpacing:'0.1em' }}>RECOFLIX</span>
          <button onClick={() => { tracker.clear(); loadAIRecs(); }} style={{ background:'none', border:'1px solid #222', color:'#444', padding:'5px 14px', borderRadius:6, fontSize:11, cursor:'pointer' }}>Reset My History</button>
        </div>
        <p style={{ color:'#222', fontSize:11 }}>Interactions tracked in real-time · Recommendations powered by Claude AI · {ALL_MOVIES.length} movies from your dataset</p>
      </div>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('profiles');
  const [user, setUser] = useState(null);
  const [apiKey, setApiKey] = useState('');
  const [movie, setMovie] = useState(null);
  const [toastEvents, setToastEvents] = useState([]);

  const handleSelectUser = (u, key) => { setUser(u); setApiKey(key); setPage('browse'); };
  const handlePlay = m => { setMovie(m); setPage('player'); };
  const handleBack = () => setPage('browse');
  const handleLogout = () => { setUser(null); setMovie(null); setPage('profiles'); };

  if (page === 'profiles') return <ProfileSelect onSelect={handleSelectUser} />;
  if (page === 'player' && movie && user)
    return <Player user={user} movie={movie} onBack={handleBack} tracker={getTracker(user.id)} apiKey={apiKey} toastEvents={toastEvents} setToastEvents={setToastEvents} />;
  return <Browse user={user} apiKey={apiKey} onPlay={handlePlay} onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
